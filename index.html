<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>グレイトヴォヤージュ — 読み込み中</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      background: #f6faff;
      color: #171c20;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
    }
    .logo { width: 180px; height: auto; margin-bottom: 8px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e4e9ee;
      border-top-color: #002045;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 14px;
      color: #43474e;
      text-align: center;
      line-height: 1.6;
    }
    .error-box {
      display: none;
      background: #fff3f3;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      padding: 20px;
      max-width: 320px;
      text-align: center;
      font-size: 14px;
      color: #b91c1c;
      line-height: 1.6;
    }
    .error-box.show { display: block; }
    /* ─── デバッグログ: 常時表示 ─── */
    #debug {
      width: 100%;
      max-width: 400px;
      max-height: 220px;
      overflow-y: auto;
      background: rgba(0,0,0,0.85);
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      padding: 10px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <img class="logo"
       src="https://lh3.googleusercontent.com/d/1gsyaqDZvfGt-dRsoaCoTIUxa8GGIoEZU"
       alt="グレイトヴォヤージュ"/>

  <div class="spinner" id="spinner"></div>
  <p class="status" id="status">認証中...</p>

  <div class="error-box" id="error-box"></div>

  <!-- デバッグログ（常時表示 — 動作確認後に削除可） -->
  <div id="debug">ログ初期化中...</div>

  <script>
    // ============================================================
    //  ★ 設定
    // ============================================================
    var LIFF_ID  = '2009771008-1FTbZYBs';

    // ★★ GASの最新デプロイURLに書き換えてください ★★
    var GAS_URL  = 'https://script.google.com/macros/s/AKfycbx9IwWWsLqgJ60qo9PRiVxuJA81gCzcKf4h5JbY-4iFqxXDt2VfAjVfJLH-aOvu6ROt/exec';

    // ============================================================
    //  デバッグ
    // ============================================================
    var _logs = [];
    function dbg(msg) {
      var ts = new Date().toLocaleTimeString('ja-JP');
      var line = '[' + ts + '] ' + msg;
      _logs.push(line);
      console.log('[GHP-LIFF]', msg);
      var el = document.getElementById('debug');
      if (el) el.textContent = _logs.join('\n');
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      var errBox = document.getElementById('error-box');
      errBox.innerHTML = msg || '読み込みに失敗しました。<br/>LINEアプリからもう一度開き直してください。';
      errBox.classList.add('show');
    }

    // ============================================================
    //  userId 取得後にGASへリダイレクト
    // ============================================================
    function redirectToGAS(userId) {
      if (!userId) {
        dbg('ERROR: userId is empty, cannot redirect');
        showError('ユーザーIDを取得できませんでした。<br/>LINEアプリを再起動して試してください。');
        return;
      }
      var url = GAS_URL + '?uid=' + encodeURIComponent(userId);
      dbg('Redirecting to: ' + url);
      setStatus('フォームへ移動中...');

      // 3秒後にリダイレクト（デバッグログを見る時間を確保）
      // ★ 動作確認が終わったら setTimeout を外して即リダイレクトにできます
      setTimeout(function() {
        location.href = url;
      }, 3000);
    }

    // ============================================================
    //  LIFF 初期化 & userId 取得
    // ============================================================
    dbg('=== GitHub Pages LIFF Auth ===');
    dbg('LIFF_ID = ' + LIFF_ID);
    dbg('GAS_URL = ' + GAS_URL);
    dbg('location = ' + location.href);
    dbg('userAgent = ' + navigator.userAgent.substring(0, 80));
    setStatus('LINEアカウントを確認中...');

    // 全体タイムアウト: 15秒後もまだ滞在していたらエラー表示
    var _globalTimeout = setTimeout(function() {
      dbg('GLOBAL TIMEOUT 15s');
      showError('認証がタイムアウトしました。<br/>LINEアプリを再起動してお試しください。');
    }, 15000);

    liff.init({ liffId: LIFF_ID })
      .then(function() {
        dbg('--- liff.init() SUCCESS ---');
        dbg('isLoggedIn = ' + liff.isLoggedIn());
        dbg('isInClient = ' + liff.isInClient());
        try { dbg('OS = ' + liff.getOS()); } catch(e) {}
        try { dbg('language = ' + liff.getLanguage()); } catch(e) {}
        try { dbg('version = ' + liff.getVersion()); } catch(e) {}

        // ── ログインチェック ──
        if (!liff.isLoggedIn()) {
          dbg('Not logged in → calling liff.login()');
          setStatus('LINEログインへ移動...');
          liff.login();
          return;
        }

        setStatus('ユーザー情報を取得中...');

        // ── 方法1: getContext() ──
        try {
          var ctx = liff.getContext();
          dbg('getContext() = ' + JSON.stringify(ctx));
          if (ctx && ctx.userId) {
            dbg('★ userId from getContext: ' + ctx.userId);
            clearTimeout(_globalTimeout);
            redirectToGAS(ctx.userId);
            return;
          } else {
            dbg('getContext() returned no userId');
          }
        } catch(e) {
          dbg('getContext() error: ' + e.message);
        }

        // ── 方法2: getDecodedIDToken() ──
        try {
          var tok = liff.getDecodedIDToken();
          dbg('getDecodedIDToken() = ' + JSON.stringify(tok));
          if (tok && tok.sub) {
            dbg('★ userId from IDToken.sub: ' + tok.sub);
            clearTimeout(_globalTimeout);
            redirectToGAS(tok.sub);
            return;
          } else {
            dbg('getDecodedIDToken() returned no sub');
          }
        } catch(e) {
          dbg('getDecodedIDToken() error: ' + e.message);
        }

        // ── 方法3: getProfile()（8秒タイムアウト） ──
        dbg('Trying getProfile() with 8s timeout...');
        var profileDone = false;
        var profileTimer = setTimeout(function() {
          if (!profileDone) {
            profileDone = true;
            dbg('getProfile() TIMEOUT (8s)');
            clearTimeout(_globalTimeout);
            showError('ユーザー情報の取得がタイムアウトしました。<br/>LINEアプリを再起動してお試しください。');
          }
        }, 8000);

        liff.getProfile()
          .then(function(p) {
            if (profileDone) return;
            profileDone = true;
            clearTimeout(profileTimer);
            clearTimeout(_globalTimeout);
            dbg('getProfile() SUCCESS = ' + JSON.stringify(p));
            if (p && p.userId) {
              dbg('★ userId from getProfile: ' + p.userId);
              redirectToGAS(p.userId);
            } else {
              dbg('getProfile() returned no userId');
              showError('プロフィール情報にユーザーIDが含まれていません。');
            }
          })
          .catch(function(e) {
            if (profileDone) return;
            profileDone = true;
            clearTimeout(profileTimer);
            clearTimeout(_globalTimeout);
            dbg('getProfile() ERROR: ' + e.message);
            showError('プロフィール取得エラー: ' + e.message);
          });
      })
      .catch(function(err) {
        clearTimeout(_globalTimeout);
        dbg('--- liff.init() FAILED ---');
        dbg('error: ' + err.message);
        dbg('error name: ' + err.name);
        dbg('error stack: ' + (err.stack || 'N/A').substring(0, 200));
        showError('LIFF初期化エラー: ' + err.message + '<br/>LINEアプリから開いているか確認してください。');
      });
  </script>

</body>
</html>
