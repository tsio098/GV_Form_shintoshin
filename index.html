<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>グレイトヴォヤージュ — 読み込み中</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      background: #f6faff;
      color: #171c20;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }
    .logo {
      width: 180px;
      height: auto;
      margin-bottom: 12px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e4e9ee;
      border-top-color: #002045;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 14px;
      color: #43474e;
      text-align: center;
      line-height: 1.6;
    }
    .error-box {
      display: none;
      background: #fff3f3;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      padding: 20px;
      max-width: 320px;
      text-align: center;
      font-size: 14px;
      color: #b91c1c;
      line-height: 1.6;
    }
    .error-box.show { display: block; }
    /* デバッグパネル */
    #debug {
      display: none;
      position: fixed;
      bottom: 8px;
      left: 8px;
      right: 8px;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0,0,0,0.85);
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      padding: 8px;
      border-radius: 8px;
      z-index: 9999;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #debug.show { display: block; }
  </style>
</head>
<body>

  <img class="logo"
       src="https://lh3.googleusercontent.com/d/1gsyaqDZvfGt-dRsoaCoTIUxa8GGIoEZU"
       alt="グレイトヴォヤージュ"/>

  <div class="spinner" id="spinner"></div>
  <p class="status" id="status">認証中...</p>

  <div class="error-box" id="error-box">
    読み込みに失敗しました。<br/>
    LINEアプリからもう一度開き直してください。
  </div>

  <div id="debug"></div>

  <script>
    // ============================================================
    //  ★ 設定（デプロイURLが変わった場合はここだけ変更）
    // ============================================================
    const LIFF_ID  = '2009771008-1FTbZYBs';

    // ★★ ここにGASのデプロイURLを貼り付けてください ★★
    // 例: 'https://script.google.com/macros/s/AKfycbXXXXXXXX/exec'
    const GAS_URL  = 'https://script.google.com/macros/s/AKfycbw7yp4h5KSpMIuK07KMb7HZIFcNhm50ttZ2PCBtjh1f-az6F_e8NgwF2qpwCb5SDj2t/exec';

    // ============================================================
    //  デバッグ（ロゴを5回タップで表示）
    // ============================================================
    var _tapCount = 0, _tapTimer = null, _logs = [];
    function dbg(msg) {
      var ts = new Date().toLocaleTimeString('ja-JP');
      _logs.push('[' + ts + '] ' + msg);
      console.log('[GHP-LIFF]', msg);
      document.getElementById('debug').textContent = _logs.join('\n');
    }
    document.querySelector('.logo').addEventListener('click', function() {
      _tapCount++;
      clearTimeout(_tapTimer);
      _tapTimer = setTimeout(function() { _tapCount = 0; }, 2000);
      if (_tapCount >= 5) {
        document.getElementById('debug').classList.toggle('show');
        _tapCount = 0;
      }
    });

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function showError() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').style.display  = 'none';
      document.getElementById('error-box').classList.add('show');
    }

    // ============================================================
    //  userId 取得後にGASへリダイレクト
    // ============================================================
    function redirectToGAS(userId) {
      dbg('Redirecting to GAS with uid=' + userId);
      setStatus('フォームへ移動中...');
      // uid を持ってGASへ。GAS側でcheckUserId()を呼び、新規/既存を判定する
      location.href = GAS_URL + '?uid=' + encodeURIComponent(userId);
    }

    // ============================================================
    //  LIFF 初期化 & userId 取得（3段フォールバック）
    // ============================================================
    dbg('Starting LIFF init, LIFF_ID=' + LIFF_ID);
    setStatus('LINEアカウントを確認中...');

    liff.init({ liffId: LIFF_ID })
      .then(function() {
        dbg('liff.init() SUCCESS');
        dbg('isLoggedIn=' + liff.isLoggedIn());
        dbg('isInClient=' + liff.isInClient());
        dbg('OS=' + liff.getOS());

        if (!liff.isLoggedIn()) {
          dbg('Not logged in → liff.login()');
          setStatus('LINEログインへ移動...');
          liff.login();
          return;
        }

        setStatus('ユーザー情報を取得中...');

        // 方法1: getContext()
        try {
          var ctx = liff.getContext();
          dbg('getContext()=' + JSON.stringify(ctx));
          if (ctx && ctx.userId) {
            dbg('★ userId from getContext');
            redirectToGAS(ctx.userId);
            return;
          }
        } catch(e) { dbg('getContext() error: ' + e.message); }

        // 方法2: getDecodedIDToken()
        try {
          var tok = liff.getDecodedIDToken();
          dbg('getDecodedIDToken()=' + JSON.stringify(tok));
          if (tok && tok.sub) {
            dbg('★ userId from IDToken.sub');
            redirectToGAS(tok.sub);
            return;
          }
        } catch(e) { dbg('getDecodedIDToken() error: ' + e.message); }

        // 方法3: getProfile()（5秒タイムアウト付き）
        dbg('Trying getProfile()...');
        var done = false;
        var timer = setTimeout(function() {
          if (!done) {
            done = true;
            dbg('getProfile() TIMEOUT → showError');
            showError();
          }
        }, 5000);

        liff.getProfile()
          .then(function(p) {
            if (done) return;
            done = true;
            clearTimeout(timer);
            dbg('getProfile() SUCCESS, userId=' + p.userId);
            redirectToGAS(p.userId);
          })
          .catch(function(e) {
            if (done) return;
            done = true;
            clearTimeout(timer);
            dbg('getProfile() ERROR: ' + e.message);
            showError();
          });
      })
      .catch(function(err) {
        dbg('liff.init() FAILED: ' + err.message);
        showError();
      });
  </script>

</body>
</html>
